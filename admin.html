<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin | Maximiza tu Empresa</title>
  <link rel="icon" href="assets/logo-n.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    [hidden] { display: none !important; }
    body[data-page="admin"] .admin-main {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }
    body[data-page="admin"] .admin-box {
      width: min(520px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 30px;
    }
    body[data-page="admin"] .admin-panel {
      width: min(1100px, calc(100vw - 32px));
      margin: 0 auto;
    }
    body[data-page="admin"] .admin-logo {
      margin-inline: auto;
    }
    .admin-edit-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 12px;
    }
    .admin-edit-grid .full {
      grid-column: 1 / -1;
    }
    .admin-section-title {
      margin: 22px 0 10px;
      color: var(--cyan);
      font-weight: 1000;
      letter-spacing: .08em;
      text-transform: uppercase;
      font-size: .8rem;
    }
    @media(max-width:760px){
      .admin-edit-grid { grid-template-columns: 1fr; }
      .admin-edit-grid .full { grid-column: auto; }
    }
  </style>
</head>
<body data-page="admin">
  <canvas id="particles"></canvas>
  <div class="cursor-glow" aria-hidden="true"></div>

  <main class="admin-main">
    <section class="admin-box glass" id="adminLoginBox">
      <span class="brand-mark admin-logo">N</span>
      <h1>Admin</h1>

      <form id="firebaseLoginForm">
        <input class="input" id="adminEmail" type="email" placeholder="Correo admin" autocomplete="username" value="maximisatuempresa@gmail.com" />
        <input class="input" id="adminPassword" type="password" placeholder="Clave" autocomplete="current-password" style="margin-top:12px;" />

        <div class="hero-actions" style="justify-content:center;margin-bottom:0;">
          <button class="btn-primary magnetic" type="submit">Entrar</button>
          <a class="btn-secondary" href="index.html">Volver</a>
        </div>

        <p class="admin-message" id="adminMessage"></p>
      </form>
    </section>

    <section class="admin-panel" id="adminPanel" hidden>
      <div class="admin-top">
        <div>
          <span class="eyebrow">Panel privado</span>
          <h1>Editar web</h1>
        </div>
        <div class="hero-actions" style="margin:0;">
          <a class="btn-secondary" href="index.html">Ver web</a>
          <button class="btn-secondary" id="logoutButton">Salir</button>
        </div>
      </div>

      <article class="page-card glass">
        <form id="contentForm">
          <p class="admin-section-title">Datos principales</p>
          <div class="admin-edit-grid">
            <input class="input" name="brandName" placeholder="Marca" />
            <input class="input" name="displayName" placeholder="Nombre visible" />
            <input class="input full" name="heroTitle" placeholder="Título principal" />
            <textarea class="input full" name="heroSubtitle" placeholder="Subtítulo"></textarea>
          </div>

          <p class="admin-section-title">Contacto</p>
          <div class="admin-edit-grid">
            <input class="input" name="email" placeholder="Correo público" />
            <input class="input" name="whatsapp" placeholder="WhatsApp" />
            <textarea class="input full" name="whatsappMessage" placeholder="Mensaje automático de WhatsApp"></textarea>
          </div>

          <p class="admin-section-title">Redes</p>
          <div class="admin-edit-grid">
            <input class="input" name="facebookUrl" placeholder="Facebook URL" />
            <input class="input" name="spotifyUrl" placeholder="Spotify URL" />
            <input class="input" name="instagramUrl" placeholder="Instagram URL" />
            <input class="input" name="tiktokUrl" placeholder="TikTok URL" />
            <input class="input" name="youtubeUrl" placeholder="YouTube URL" />
            <input class="input" name="linkedinUrl" placeholder="LinkedIn URL" />
            <input class="input full" name="githubUrl" placeholder="GitHub URL" />
          </div>

          <p class="admin-section-title">Mis webs</p>
          <div class="admin-edit-grid">
            <input class="input" name="web1Name" placeholder="Nombre Web 1" />
            <input class="input" name="web1Url" placeholder="URL Web 1" />
            <input class="input" name="web2Name" placeholder="Nombre Web 2" />
            <input class="input" name="web2Url" placeholder="URL Web 2" />
            <input class="input" name="web3Name" placeholder="Nombre Web 3" />
            <input class="input" name="web3Url" placeholder="URL Web 3" />
          </div>

          <p class="admin-section-title">Imagen</p>
          <div class="admin-edit-grid">
            <input class="input full" name="profileImageUrl" placeholder="URL de imagen principal" />
            <small class="notice full">Para costo cero, usa URL de imagen. No actives Storage todavía.</small>
          </div>

          <p class="admin-section-title">Estado</p>
          <div class="admin-edit-grid">
            <input class="input" name="statusLabel" placeholder="Estado actual" />
            <input class="input" name="statusDescription" placeholder="Descripción del estado" />
            <input class="input" name="officeHours" placeholder="Horario oficina" />
            <input class="input" name="gymHours" placeholder="Horario gimnasio" />
            <input class="input full" name="restHours" placeholder="Horario descanso" />
          </div>

          <p class="admin-section-title">Servicios y pagos</p>
          <div class="admin-edit-grid">
            <textarea class="input full" name="servicesText" placeholder="Servicios"></textarea>
            <textarea class="input full" name="paymentsText" placeholder="Pagos / donaciones"></textarea>
          </div>
        </form>

        <div class="hero-actions">
          <button class="btn-secondary" id="loadDefaultsButton" type="button">Cargar datos base</button>
          <button class="btn-primary magnetic" id="saveContent" type="button">Guardar cambios</button>
          <a class="btn-secondary" href="index.html">Listo</a>
        </div>
      </article>
    </section>
  </main>

  <div class="toast" id="toast"></div>
  <script src="script.js"></script>
  <script type="module" src="firebase-admin.js"></script>
</body>
</html>
